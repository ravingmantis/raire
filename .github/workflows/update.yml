on:
  workflow_dispatch:

permissions:
  contents: write

name: Add new Air releases

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Configure git user
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

      - name: Update
        run: ./update.py

      - name: Push changes
        run: |
          git push --tags
          git push
